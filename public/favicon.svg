<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Fondo circular oscuro -->
  <circle cx="32" cy="32" r="31" fill="#0f0c05" stroke="#b8860b" stroke-width="1.5"/>

  <!-- Anillo interior dorado -->
  <circle cx="32" cy="32" r="26" fill="none" stroke="#d4a017" stroke-width="0.75" stroke-dasharray="2 2"/>

  <!-- Cruz barroca central — brazos principales -->
  <rect x="30.5" y="12" width="3" height="40" rx="1.5" fill="#d4a017"/>
  <rect x="12" y="30.5" width="40" height="3" rx="1.5" fill="#d4a017"/>

  <!-- Diamantes en los extremos de la cruz -->
  <polygon points="32,8  34,12  32,16  30,12" fill="#f5d76e"/>
  <polygon points="32,48 34,52 32,56 30,52" fill="#f5d76e"/>
  <polygon points="8,32  12,30  16,32  12,34" fill="#f5d76e"/>
  <polygon points="48,32 52,30 56,32 52,34" fill="#f5d76e"/>

  <!-- Volutes / ornamentos en las esquinas (45°) -->
  <polygon points="22,22  26,20  24,24  20,26" fill="#b8860b"/>
  <polygon points="42,22  44,26  40,24  38,20" fill="#b8860b"/>
  <polygon points="22,42  20,38  24,40  26,44" fill="#b8860b"/>
  <polygon points="42,42  38,44  40,40  44,38" fill="#b8860b"/>

  <!-- Medallón central -->
  <circle cx="32" cy="32" r="8" fill="#0f0c05" stroke="#d4a017" stroke-width="1.5"/>

  <!-- Letra C estilizada en el centro -->
  <path d="M36 27 A6 6 0 1 0 36 37" stroke="#f5d76e" stroke-width="2.2" stroke-linecap="round" fill="none"/>
</svg>